<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Housing Cost Calculator</title>
<style>
  :root {
    --indigo-600:#4f46e5; --indigo-700:#4338ca; --indigo-50:#eef2ff; --indigo-100:#e0e7ff;
    --gray-800:#1f2937; --gray-700:#374151; --gray-600:#4b5563; --gray-500:#6b7280;
    --gray-300:#d1d5db; --gray-200:#e5e7eb; --gray-50:#f9fafb;
    --red-600:#dc2626; --red-700:#b91c1c;
    --green-600:#16a34a; --green-700:#15803d;
    --blue-50:#eff6ff; --blue-700:#1d4ed8;
    --purple-50:#faf5ff; --purple-700:#7e22ce;
    --orange-700:#c2410c;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: linear-gradient(to bottom right, #eff6ff, #e0e7ff);
    color: var(--gray-800);
    min-height: 100vh;
    padding: clamp(12px, 3vw, 32px);
    line-height: 1.4;
  }
  .container { max-width: 1152px; margin: 0 auto; }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
    padding: clamp(16px, 3vw, 32px);
    margin-bottom: 32px;
  }

  .title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .title-row h1 { font-size: clamp(1.4rem, 4vw, 1.875rem); font-weight: 700; margin: 0; color: var(--gray-800); }
  h2.section { font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 700; margin: 0 0 24px; color: var(--gray-800); }

  .icon { width: 1.25rem; height: 1.25rem; flex: none; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .icon-lg { width: 2rem; height: 2rem; color: var(--indigo-600); }
  .icon-sm { width: 1rem; height: 1rem; }

  /* Inputs grid — reflows 3 -> 2 -> 1 columns as width shrinks */
  .inputs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 24px;
  }
  .field label {
    display: flex; align-items: center; gap: 8px;
    font-size: .875rem; font-weight: 500; color: var(--gray-700); margin-bottom: 8px;
  }
  .field input[type=number] {
    width: 100%; padding: 8px 14px; font-size: 1rem;
    border: 1px solid var(--gray-300); border-radius: 8px; background:#fff; color: var(--gray-800);
  }
  .field input[type=number]:focus {
    outline: none; border-color: transparent; box-shadow: 0 0 0 2px var(--indigo-600);
  }
  .field input[type=range] { width: 100%; margin-top: 8px; accent-color: var(--indigo-600); }
  .hint { font-size: .75rem; color: var(--gray-500); margin: 6px 0 0; }

  /* 5-year table: horizontal scroll on narrow screens, sticky label column */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .cost-table {
    display: grid;
    grid-template-columns: minmax(150px, 1.4fr) repeat(5, minmax(96px, 1fr));
    min-width: 640px;
  }
  .cost-table .cell { padding: 10px 8px; text-align: center; font-size: .95rem; display: flex; align-items: center; justify-content: center; }
  .cost-table .label {
    justify-content: flex-start; text-align: left; padding-left: 16px;
    position: sticky; left: 0; z-index: 2; font-weight: 500;
  }
  .cost-table .head { min-height: 64px; }
  .cost-table .year-h { font-size: 1.05rem; font-weight: 700; color: var(--indigo-600); }
  .cost-table .year-sub { font-size: .7rem; color: var(--gray-500); font-weight: 400; }
  .divider { height: 2px; background: var(--gray-300); margin: 8px 0; }
  .divider-thin { height: 1px; background: var(--gray-200); margin: 16px 0; }

  .insights { margin-top: 32px; padding: 24px; background: var(--indigo-50); border-radius: 12px; }
  .insights h3 { margin: 0 0 12px; font-weight: 600; color: var(--gray-800); }
  .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; font-size: .875rem; }
  .insights-grid .k { font-weight: 500; color: var(--gray-700); }

  /* Scenario cards — stack on mobile */
  .scenario-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; }
  .scenario { padding: 24px; border-radius: 12px; text-align: center; }
  .scenario .sc-top { font-size: .875rem; color: var(--gray-600); margin-bottom: 4px; }
  .scenario .sc-note { font-size: .75rem; color: var(--gray-500); margin-bottom: 12px; }
  .scenario .sc-big { font-size: clamp(1.3rem, 3vw, 1.5rem); font-weight: 700; }
  .scenario .sc-unit { font-size: .75rem; color: var(--gray-600); margin-top: 4px; }
  .sc-lower { background: var(--blue-50); } .sc-lower .sc-big { color: var(--blue-700); }
  .sc-base  { background: var(--indigo-100); border: 2px solid #818cf8; } .sc-base .sc-big { color: var(--indigo-700); }
  .sc-higher{ background: var(--purple-50); } .sc-higher .sc-big { color: var(--purple-700); }
</style>
</head>
<body>
<div class="container">

  <!-- Inputs -->
  <div class="card">
    <div class="title-row">
      <svg class="icon icon-lg" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <h1>Housing Cost Calculator</h1>
    </div>

    <div class="inputs-grid">
      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Home Price</label>
        <input type="number" id="homePrice" value="400000">
        <input type="range" id="homePrice_r" min="100000" max="1000000" step="5000" value="400000">
      </div>

      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Down Payment</label>
        <input type="number" id="downPayment" value="80000">
        <input type="range" id="downPayment_r" min="0" max="400000" step="1000" value="80000">
      </div>

      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Loan Term (years)</label>
        <input type="number" id="loanTerm" value="30">
      </div>

      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg> Interest Rate (%)</label>
        <input type="number" id="interestRate" value="6.5" step="0.1">
      </div>

      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Annual Homeowners Insurance</label>
        <input type="number" id="annualInsurance" value="1200">
      </div>

      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Annual Property Tax</label>
        <input type="number" id="annualTax" value="6000">
      </div>

      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><line x1="8" y1="6" x2="8" y2="6"/><line x1="16" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/></svg> Monthly HOA</label>
        <input type="number" id="monthlyHOA" value="200">
        <p class="hint" id="hoaHint"></p>
      </div>

      <div class="field">
        <label><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Annual Maintenance (% of home price)</label>
        <input type="number" id="maintenancePercent" value="1" step="0.1">
      </div>
    </div>
  </div>

  <!-- 5-Year Breakdown -->
  <div class="card">
    <h2 class="section">5-Year Cost Breakdown</h2>
    <div class="table-scroll">
      <div class="cost-table" id="costTable"><!-- generated --></div>
    </div>

    <div class="insights">
      <h3>Key Insights</h3>
      <div class="insights-grid">
        <div><span class="k">Loan Amount:</span> <span id="i_loan"></span></div>
        <div><span class="k">Down Payment:</span> <span id="i_down"></span></div>
        <div><span class="k">Total Equity Built (5 years):</span> <span id="i_equity" style="color:var(--green-600);font-weight:600"></span></div>
        <div><span class="k">Total Interest Paid (5 years):</span> <span id="i_interest" style="color:var(--red-600);font-weight:600"></span></div>
      </div>
    </div>
  </div>

  <!-- Scenario Comparison -->
  <div class="card">
    <h2 class="section">Price Scenario Comparison</h2>
    <div class="scenario-grid">
      <div class="scenario sc-lower">
        <div class="sc-top" id="sc_low_price"></div>
        <div class="sc-note">(-$25,000)</div>
        <div class="sc-big" id="sc_low_val"></div>
        <div class="sc-unit">per month</div>
      </div>
      <div class="scenario sc-base">
        <div class="sc-top" id="sc_base_price"></div>
        <div class="sc-note">(baseline)</div>
        <div class="sc-big" id="sc_base_val"></div>
        <div class="sc-unit">per month</div>
      </div>
      <div class="scenario sc-higher">
        <div class="sc-top" id="sc_high_price"></div>
        <div class="sc-note">(+$25,000)</div>
        <div class="sc-big" id="sc_high_val"></div>
        <div class="sc-unit">per month</div>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  "use strict";

  var fmt = new Intl.NumberFormat('en-US', {
    style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0
  });
  var money = function (v) { if (!isFinite(v)) v = 0; return fmt.format(v); };

  var ids = ['homePrice','downPayment','loanTerm','interestRate','annualInsurance','annualTax','monthlyHOA','maintenancePercent'];
  var el = {};
  ids.forEach(function (id) { el[id] = document.getElementById(id); });
  var homePrice_r = document.getElementById('homePrice_r');
  var downPayment_r = document.getElementById('downPayment_r');

  function num(id) { var v = parseFloat(el[id].value); return isNaN(v) ? 0 : v; }

  function mortgage(price, downPayment, interestRate, loanTerm) {
    var principal = price - downPayment;
    var monthlyRate = interestRate / 100 / 12;
    var n = loanTerm * 12;
    var monthlyPayment;
    if (n <= 0) {
      monthlyPayment = 0;
    } else if (monthlyRate === 0) {
      monthlyPayment = principal / n;
    } else {
      monthlyPayment = principal * (monthlyRate * Math.pow(1 + monthlyRate, n)) /
                       (Math.pow(1 + monthlyRate, n) - 1);
    }
    return { principal: principal, monthlyPayment: monthlyPayment, monthlyRate: monthlyRate };
  }

  function yearly(price, s) {
    var m = mortgage(price, s.downPayment, s.interestRate, s.loanTerm);
    var monthlyTax = s.annualTax / 12;
    var monthlyMaintenance = (price * s.maintenancePercent / 100) / 12;
    var monthlyInsurance = s.annualInsurance / 12;
    var remaining = m.principal;
    var out = [];
    for (var y = 1; y <= 5; y++) {
      var yInt = 0, yPrin = 0;
      for (var mo = 1; mo <= 12; mo++) {
        var interest = remaining * m.monthlyRate;
        var prin = m.monthlyPayment - interest;
        yInt += interest; yPrin += prin; remaining -= prin;
      }
      out.push({
        year: y,
        monthlyInterest: yInt / 12,
        monthlyPrincipal: yPrin / 12,
        monthlyTax: monthlyTax,
        monthlyHOA: s.monthlyHOA,
        monthlyMaintenance: monthlyMaintenance,
        monthlyInsurance: monthlyInsurance,
        totalMonthly: m.monthlyPayment + monthlyTax + s.monthlyHOA + monthlyMaintenance + monthlyInsurance,
        remainingBalance: remaining
      });
    }
    return out;
  }

  function scenario(adj, s) {
    var price = s.homePrice + adj;
    var mp = mortgage(price, s.downPayment, s.interestRate, s.loanTerm).monthlyPayment;
    return mp + s.annualTax / 12 + s.monthlyHOA + (price * s.maintenancePercent / 100) / 12 + s.annualInsurance / 12;
  }

  var rows = [
    { label: 'Interest',            key: 'monthlyInterest',    color: 'var(--red-700)' },
    { label: 'Principal (Equity)',  key: 'monthlyPrincipal',   color: 'var(--green-700)' },
    { label: 'Homeowners Insurance',key: 'monthlyInsurance',   color: 'var(--indigo-700)' },
    { label: 'Property Tax',        key: 'monthlyTax',         color: 'var(--blue-700)' },
    { label: 'HOA Fees',            key: 'monthlyHOA',         color: 'var(--purple-700)' },
    { label: 'Maintenance',         key: 'monthlyMaintenance', color: 'var(--orange-700)' }
  ];

  // Build the table skeleton once; keep references to the value cells.
  var table = document.getElementById('costTable');
  var refs = { total: [], rows: {}, remaining: [] };

  function bgFor(kind, rowIndex) {
    if (kind === 'total') return 'var(--gray-50)';
    if (kind === 'remaining') return 'var(--indigo-50)';
    if (kind === 'row') return rowIndex % 2 === 1 ? 'var(--gray-50)' : '#fff';
    return '#fff';
  }
  function makeCell(text, cls, bg, color) {
    var d = document.createElement('div');
    d.className = 'cell' + (cls ? ' ' + cls : '');
    if (bg) d.style.background = bg;
    if (color) d.style.color = color;
    if (text != null) d.innerHTML = text;
    return d;
  }

  function buildTable() {
    // Header
    table.appendChild(makeCell('<span style="font-weight:600;color:var(--gray-700)">Category</span>', 'label head', '#fff'));
    for (var y = 1; y <= 5; y++) {
      table.appendChild(makeCell('<div><div class="year-h">Year ' + y + '</div><div class="year-sub">Monthly</div></div>', 'head', '#fff'));
    }
    // divider (full-width via spanning)
    var d1 = makeCell('', '', '#fff'); d1.style.gridColumn = '1 / -1';
    d1.innerHTML = '<div class="divider" style="width:100%"></div>';
    d1.style.padding = '0'; table.appendChild(d1);

    // Total row
    table.appendChild(makeCell('Total Payment', 'label', bgFor('total'), 'var(--gray-700)'));
    for (var t = 0; t < 5; t++) {
      var c = makeCell('', '', bgFor('total'), 'var(--gray-800)');
      c.style.fontWeight = '700'; c.style.fontSize = '1.15rem';
      refs.total.push(c); table.appendChild(c);
    }

    var d2 = makeCell('', '', '#fff'); d2.style.gridColumn = '1 / -1';
    d2.innerHTML = '<div class="divider-thin" style="width:100%"></div>'; d2.style.padding = '0';
    table.appendChild(d2);

    // Category rows
    rows.forEach(function (row, ri) {
      var bg = bgFor('row', ri);
      table.appendChild(makeCell(row.label, 'label', bg, 'var(--gray-600)'));
      refs.rows[row.key] = [];
      for (var k = 0; k < 5; k++) {
        var cell = makeCell('', '', bg, row.color);
        cell.style.fontWeight = '600';
        refs.rows[row.key].push(cell);
        table.appendChild(cell);
      }
    });

    var d3 = makeCell('', '', '#fff'); d3.style.gridColumn = '1 / -1';
    d3.innerHTML = '<div class="divider" style="width:100%"></div>'; d3.style.padding = '0';
    table.appendChild(d3);

    // Remaining balance row
    table.appendChild(makeCell('Remaining Balance', 'label', bgFor('remaining'), 'var(--gray-700)'));
    for (var r = 0; r < 5; r++) {
      var rc = makeCell('', '', bgFor('remaining'), 'var(--gray-700)');
      rc.style.fontWeight = '600';
      refs.remaining.push(rc); table.appendChild(rc);
    }
  }

  function render() {
    var s = {
      homePrice: num('homePrice'),
      downPayment: num('downPayment'),
      loanTerm: num('loanTerm'),
      interestRate: num('interestRate'),
      annualInsurance: num('annualInsurance'),
      annualTax: num('annualTax'),
      monthlyHOA: num('monthlyHOA'),
      maintenancePercent: num('maintenancePercent')
    };

    var data = yearly(s.homePrice, s);

    data.forEach(function (d, i) {
      refs.total[i].textContent = money(d.totalMonthly);
      rows.forEach(function (row) { refs.rows[row.key][i].textContent = money(d[row.key]); });
      refs.remaining[i].textContent = money(d.remainingBalance);
    });

    // Insights
    document.getElementById('i_loan').textContent = money(s.homePrice - s.downPayment);
    var pct = s.homePrice ? ((s.downPayment / s.homePrice) * 100).toFixed(1) : '0.0';
    document.getElementById('i_down').textContent = money(s.downPayment) + ' (' + pct + '%)';
    document.getElementById('i_equity').textContent = money(data.reduce(function (a, y) { return a + y.monthlyPrincipal * 12; }, 0));
    document.getElementById('i_interest').textContent = money(data.reduce(function (a, y) { return a + y.monthlyInterest * 12; }, 0));

    // HOA equivalent buying power
    var hint = document.getElementById('hoaHint');
    if (s.monthlyHOA > 0) {
      var r = s.interestRate / 100 / 12, n = s.loanTerm * 12, eq;
      if (n <= 0) eq = 0;
      else if (r === 0) eq = s.monthlyHOA * n;
      else eq = s.monthlyHOA * (Math.pow(1 + r, n) - 1) / (r * Math.pow(1 + r, n));
      hint.textContent = '\u2248 ' + money(eq) + ' in additional home buying power';
    } else {
      hint.textContent = '';
    }

    // Scenarios
    document.getElementById('sc_low_price').textContent = 'Home Price: ' + money(s.homePrice - 25000);
    document.getElementById('sc_low_val').textContent = money(scenario(-25000, s));
    document.getElementById('sc_base_price').textContent = 'Current: ' + money(s.homePrice);
    document.getElementById('sc_base_val').textContent = money(data[0].totalMonthly);
    document.getElementById('sc_high_price').textContent = 'Home Price: ' + money(s.homePrice + 25000);
    document.getElementById('sc_high_val').textContent = money(scenario(25000, s));
  }

  // Wire inputs. Number + range stay in sync for the two that have sliders.
  ids.forEach(function (id) {
    el[id].addEventListener('input', function () {
      if (id === 'homePrice') {
        homePrice_r.value = el.homePrice.value;
        // keep down payment slider max tied to home price
        downPayment_r.max = String(num('homePrice'));
      }
      if (id === 'downPayment') downPayment_r.value = el.downPayment.value;
      render();
    });
  });
  homePrice_r.addEventListener('input', function () {
    el.homePrice.value = homePrice_r.value;
    downPayment_r.max = homePrice_r.value;
    render();
  });
  downPayment_r.addEventListener('input', function () {
    el.downPayment.value = downPayment_r.value;
    render();
  });

  buildTable();
  downPayment_r.max = String(num('homePrice'));
  render();
})();
</script>
</body>
</html>
